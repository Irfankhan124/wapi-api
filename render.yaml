services:
  - type: web
    name: wapi-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    numInstances: 1
    disk:
      name: wapi-baileys-sessions
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: BAILEYS_SESSION_DIR
        value: /var/data/baileys-sessions
      - key: WAPI_DEFAULT_COUNTRY_CODE
        value: 93
      - key: BAILEYS_SEND_DELAY_MS
        value: 650
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
